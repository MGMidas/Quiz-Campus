<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejoindre — QuizCampus</title>
    <link rel="icon" type="image/png" href="./asset/Logo.png">
    <link rel="stylesheet" href="./Styles/rejoindre.css">
</head>
<body class="auth-page">
    <div class="theme-btn-wrap">
        <button id="btn-theme">🌙</button>
    </div>
    <div class="auth-card">
        <a href="accueil.html" class="btn-back">&larr; Retour</a>
        <div class="logo">Quiz <span>Campus</span></div>
        <p class="subtitle">Entre ton code PIN pour rejoindre</p>

        <div id="player-toast" class="toast"></div>

        <div class="input-group">
            <label>Code PIN</label>
            <input type="text" id="input-pin" placeholder="123456" />
        </div>

        <div class="input-group">
            <label>Pseudo</label>
            <input type="text" id="input-pseudo" placeholder="Mon super pseudo" />
        </div>

        <button id="btn-valider" class="btn-auth">Valider</button>

        <div class="auth-divider">ou</div>

        <a href="connexion.html" class="auth-link">
            <span>Animateur ? Connecte-toi</span>
        </a>
        <a href="inscription.html" class="auth-link">
            Pas encore de compte ? <span>Créer un compte</span>
        </a>
    </div>

    <script>
        const btnTheme = document.getElementById('btn-theme');
        const root = document.documentElement;
        const savedTheme = localStorage.getItem('theme');
        const osDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme) {
            if (savedTheme === 'dark') {
                root.setAttribute('data-theme', 'dark');
                btnTheme.textContent = '☀️';
            }
        } else if (osDark) {
            root.setAttribute('data-theme', 'dark');
            btnTheme.textContent = '☀️';
        }

        btnTheme.addEventListener('click', () => {
            const isDark = root.getAttribute('data-theme') === 'dark';
            if (isDark) {
                root.removeAttribute('data-theme');
                btnTheme.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                root.setAttribute('data-theme', 'dark');
                btnTheme.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
